services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: liquidgo-postgres
    environment:
      POSTGRES_DB: liquidgo
      POSTGRES_USER: liquidgo
      POSTGRES_PASSWORD: liquidgo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liquidgo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liquidgo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
